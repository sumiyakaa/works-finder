<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Aoki Design Studio Works Finder の React + TypeScript 再構築に向けた初期土台。"
    />
    <meta name="theme-color" content="#18202b" />
    <link
      rel="icon"
      href="/assets/images/meta/favicon.svg"
      type="image/svg+xml"
      sizes="any"
    />
    <link
      rel="apple-touch-icon"
      href="/assets/images/meta/apple-touch-icon.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Aoki Design Studio Works Finder | React Scaffold</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: #0e141b;
        color: #eef3f8;
        font-family: "Avenir Next", "Segoe UI", "Hiragino Sans", "Yu Gothic",
          sans-serif;
      }

      .app-boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .app-boot-fallback__panel {
        width: min(680px, 100%);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #131b24;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.24);
      }

      .app-boot-fallback__eyebrow {
        margin: 0 0 12px;
        color: #9aa8b7;
        font-size: 0.78rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .app-boot-fallback h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 1.04;
      }

      .app-boot-fallback p {
        margin: 16px 0 0;
        color: #c2cfdb;
        line-height: 1.7;
      }

      .app-boot-fallback code {
        display: inline-block;
        margin-top: 8px;
        padding: 8px 10px;
        border-radius: 8px;
        background: #1d2834;
        color: #d3b98f;
        font-family: "Consolas", "SFMono-Regular", monospace;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="app-boot-fallback">
        <div class="app-boot-fallback__panel">
          <p class="app-boot-fallback__eyebrow">Works Finder</p>
          <h1>Aoki Design Studio Works Finder</h1>
          <p>
            このページを `index.html` の直開きで表示すると、Vite の開発用スクリプトが読めず、
            画面が真っ白に見えることがあります。
          </p>
          <p>
            開発中は <code>npm run dev</code> を実行し、表示されたローカル URL から開いてください。
          </p>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
